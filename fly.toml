# Mood AI API — Fly.io deployment (Docker).
# Pair with any hosted Postgres (docs/DATABASE-OPTIONS.md) + R2 for durable files.
app = "moodai-api"
primary_region = "jnb"          # Johannesburg — closest to 🇬🇭 Accra

[build]
  dockerfile = "Dockerfile.fly"

[env]
  UPLOAD_DIR = "/data/storage"  # persistent volume below (uploads before R2 is wired)
  MEDIA_DIR = "/data/media"

[[mounts]]
  source = "moodai_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  # Always-on: renders/edits can exceed 60s — machines must not sleep mid-job.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    grace_period = "40s"   # boot runs alembic first
    method = "GET"
    path = "/healthz"
    timeout = "5s"

[vm]
  memory = "1gb"           # ffmpeg pays its rent here; 512mb works for chat-only
  cpu_kind = "shared"
  cpus = 1
