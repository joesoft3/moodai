# Mood AI — web PR-E2E: Playwright against a LOCAL production build on every
# push/PR. Catches UI regressions before merge (public pages, landing features,
# runtime console errors). Screenshots always upload as artifacts.
name: web-e2e

on:
  push:
    branches: [main]
    paths: ["frontend/**", "scripts/web-e2e.mjs", ".github/workflows/web-e2e.yml"]
  pull_request:
    paths: ["frontend/**", "scripts/web-e2e.mjs", ".github/workflows/web-e2e.yml"]

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install + build the web app
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:4101/api/v1   # stub — public pages don't call it
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:4100
        run: |
          npm ci
          npm run build

      - name: Start production server
        working-directory: frontend
        run: |
          (npx next start -p 4100 > /tmp/next-server.log 2>&1 &)
          for i in $(seq 1 40); do
            curl -sf http://127.0.0.1:4100/ >/dev/null && exit 0
            sleep 2
          done
          echo "server never came up" && cat /tmp/next-server.log && exit 1

      - name: Install Playwright + Chromium
        run: |
          mkdir -p /tmp/web-e2e && cd /tmp/web-e2e
          npm init -y >/dev/null
          npm install --no-fund --no-audit playwright@1.49.1
          npx playwright install --with-deps chromium

      - name: Run web E2E
        env:
          WEB_URL: http://127.0.0.1:4100
          NODE_PATH: /tmp/web-e2e/node_modules
        run: node scripts/web-e2e.mjs

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-e2e-screenshots
          path: web-e2e-shots/
          if-no-files-found: ignore
          retention-days: 14
