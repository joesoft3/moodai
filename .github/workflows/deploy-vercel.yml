# ─────────────────────────────────────────────────────────────────────────────
# Mood AI — AUTO-DEPLOY backend API to Vercel on every push to main.
#
# One-time setup (~3 min, see docs/DEPLOY-VERCEL.md):
#   1. Vercel → Add New Project → import joesoft3/moodai → Root Directory: backend
#      → copy Project ID (Settings → General) and your account ID
#      (vercel.com/account → General → "Your ID").
#   2. Vercel account → Settings → Tokens → create token.
#   3. GitHub repo → Settings → Secrets and variables → Actions:
#        Secrets:    VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#        Variables:  VERCEL_CONNECTED = true
#
# From then on:  git push → this workflow hands the source to Vercel, which
# builds SERVER-SIDE with the correct Python runtime (no CI/serverless wheel
# mismatch) and rolls out production.
# ─────────────────────────────────────────────────────────────────────────────
name: deploy-vercel

on:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/deploy-vercel.yml"]
  workflow_dispatch: {}

concurrency:
  group: vercel-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip cleanly until Vercel is connected (see docs/DEPLOY-VERCEL.md). No red
    # board while undeployed.
    if: ${{ vars.VERCEL_CONNECTED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Vercel (server-side build, production)
        # Run from the REPO ROOT: the linked project's rootDirectory=backend
        # is resolved relative to CWD, so running inside backend/ breaks it.
        env:
          # Headless deploy: these two IDs skip interactive project linking.
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -o pipefail  # never let tail hide a failed deploy
          URL=$(npx --yes vercel@latest deploy --prod --yes \
            --token "$VERCEL_TOKEN" 2>&1 | tee /tmp/vercel-deploy.log | tail -1)
          echo "### 🚀 Vercel deploy live" >> "$GITHUB_STEP_SUMMARY"
          echo "$URL" >> "$GITHUB_STEP_SUMMARY"
