# ─────────────────────────────────────────────────────────────────────────────
# Mood AI — Flutter mobile: build an installable APK on every release tag
# (and on demand). No signing secrets needed for the debug-signed dev APK;
# add release signing later when publishing (see notes at the bottom).
#
# Run manually:  Actions → "mobile-apk" → Run workflow → downloads artifact.
# Auto:          push a tag like  v0.2.0  → APK built + attached to a GitHub Release.
# ─────────────────────────────────────────────────────────────────────────────
name: mobile-apk

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      api_url:
        description: "Default API base baked into the APK (blank = localhost default)"
        required: false
        default: ""

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install Android platform 36 (runners ship 34; plugins require 36)
        run: |
          SDKMGR="$(command -v sdkmanager || echo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager")"
          yes | "$SDKMGR" --licenses > /dev/null || true
          "$SDKMGR" --install "platforms;android-36" "build-tools;36.0.0"

      - name: Scaffold the android platform (not committed on purpose)
        working-directory: mobile
        run: |
          flutter create --platforms=android --project-name mood_ai_mobile --org ai.mood --no-overwrite .
          rm -f test/widget_test.dart  # stock template test references a MyApp that isn't ours
          # modern plugin lifecycle (flutter_plugin_android_lifecycle) needs compileSdk ≥ 36
          python3 - << 'PY'
          import pathlib, re
          for name in ("android/app/build.gradle.kts", "android/app/build.gradle"):
              p = pathlib.Path(name)
              if not p.exists():
                  continue
              s = p.read_text()
              s = re.sub(r"compileSdk\s*=\s*flutter\.compileSdkVersion", "compileSdk = 36", s)
              s = re.sub(r'compileSdk\s+flutter\.compileSdkVersion', 'compileSdk 36', s)
              s = re.sub(r"targetSdk\s*=\s*flutter\.targetSdkVersion", "targetSdk = 36", s)
              s = re.sub(r'targetSdk\s+flutter\.targetSdkVersion', 'targetSdk 36', s)
              p.write_text(s)
              print("patched", p)
          PY

      - name: Gradle init script — force compileSdk 36 on EVERY android module (plugins too)
        run: |
          # Groovy init script: works for both Groovy & KTS projects, no AGP-9 DSL typing traps.
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/compile-sdk-36.gradle << 'GROOVY'
          allprojects {
              afterEvaluate { project ->
                  def isAndroid = project.plugins.hasPlugin('com.android.library') ||
                                  project.plugins.hasPlugin('com.android.application')
                  if (isAndroid) {
                      project.android.compileSdkVersion = 36
                      project.logger.lifecycle("[init] ${project.name}: compileSdk -> 36")
                  }
              }
          }
          GROOVY

      - name: Grant runtime permissions (release manifest)
        working-directory: mobile
        run: |
          python3 - << 'PY'
          import pathlib
          p = pathlib.Path("android/app/src/main/AndroidManifest.xml")
          s = p.read_text()
          perms = ('<uses-permission android:name="android.permission.INTERNET"/>\n'
                   '    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n')
          if "RECORD_AUDIO" not in s:
              s = s.replace("<application", perms + "    <application", 1)
              p.write_text(s)
              print("manifest patched")
          PY

      - name: Pub get
        working-directory: mobile
        run: flutter pub get

      - name: Static analysis (non-blocking)
        working-directory: mobile
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build release APK (dev-signed)
        working-directory: mobile
        env:
          MOBILE_API_URL: ${{ inputs.api_url || secrets.MOOD_MOBILE_API_URL }}
        run: |
          ARGS=""
          if [ -n "$MOBILE_API_URL" ]; then ARGS="--dart-define=API_URL=$MOBILE_API_URL"; fi
          flutter build apk --release $ARGS

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mood-ai-android-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Attach APK to the GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true

# Release-signing for Play distribution (later):
#   keytool -genkey -v -keystore mood-upload.jks -keyalg RSA -keysize 2048 -validity 10000 -alias mood
#   base64 -w0 mood-upload.jks → secrets MOOD_UPLOAD_KEYSTORE (+ _PASSWORD, _KEY_ALIAS, _KEY_PASSWORD)
# then key.properties + signingConfigs in android/app/build.gradle.kts.
