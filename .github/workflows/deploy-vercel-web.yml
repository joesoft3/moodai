# ─────────────────────────────────────────────────────────────────────────────
# Mood AI — AUTO-DEPLOY web app (Next.js) to Vercel on every push to main.
# Sister workflow to deploy-vercel.yml (which ships the API).
#
# One-time setup: same VERCEL_TOKEN / VERCEL_ORG_ID secrets + this project's id
# as secret VERCEL_WEB_PROJECT_ID, and variable VERCEL_CONNECTED=true.
# Headless deploy — Vercel builds server-side with the pinned Node runtime.
# ─────────────────────────────────────────────────────────────────────────────
name: deploy-vercel-web

on:
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/deploy-vercel-web.yml"]
  workflow_dispatch: {}

concurrency:
  group: vercel-web-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: ${{ vars.VERCEL_CONNECTED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy web app to Vercel (server-side build, production)
        # Run from the REPO ROOT: the linked project's rootDirectory=frontend
        # is resolved relative to CWD, so running inside frontend/ breaks it.
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
        run: |
          set -o pipefail  # never let tail hide a failed deploy
          URL=$(npx --yes vercel@latest deploy --prod --yes \
            --token "$VERCEL_TOKEN" 2>&1 | tee /tmp/vercel-deploy.log | tail -1)
          echo "### 🚀 Vercel web deploy live" >> "$GITHUB_STEP_SUMMARY"
          echo "$URL" >> "$GITHUB_STEP_SUMMARY"
