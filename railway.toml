# Mood AI API — Railway service config.
# When you add the service on Railway: Settings → set "Root Directory" to /backend
# (or let Railway pick this file up automatically for monorepo layouts).
[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "sh -c 'alembic upgrade head || echo \"[warn] alembic failed — relying on AUTO_CREATE_TABLES\"; uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
