name: mood_ai_mobile
description: Mood AI — Grok-class assistant (Flutter mobile client for the Mood API).
publish_to: "none"
version: 0.9.0+9

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  shared_preferences: ^2.3.2
  flutter_markdown: ^0.7.3
  record: ^7.1.1
  audioplayers: ^6.1.0
  file_picker: ^8.1.2
  path_provider: ^2.1.3
  video_player: ^2.13.0
  share_plus: ^13.2.1
  # 🔔 push (Phase 2 — safe without google-services.json, see lib/push.dart)
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
