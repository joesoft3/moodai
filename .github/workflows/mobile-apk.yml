# ─────────────────────────────────────────────────────────────────────────────
# Mood AI — Flutter mobile: build an installable APK on every release tag
# (and on demand). No signing secrets needed for the debug-signed dev APK;
# add release signing later when publishing (see notes at the bottom).
#
# Run manually:  Actions → "mobile-apk" → Run workflow → downloads artifact.
# Auto:          push a tag like  v0.2.0  → APK built + attached to a GitHub Release.
# ─────────────────────────────────────────────────────────────────────────────
name: mobile-apk

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      api_url:
        description: "Default API base baked into the APK (blank = localhost default)"
        required: false
        default: ""

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write  # attach the APK to the GitHub Release on tags
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install Android platform 36 (runners ship 34; plugins require 36)
        run: |
          SDKMGR="$(command -v sdkmanager || echo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager")"
          yes | "$SDKMGR" --licenses > /dev/null || true
          "$SDKMGR" --install "platforms;android-36" "build-tools;36.0.0"

      - name: Scaffold the android platform (not committed on purpose)
        working-directory: mobile
        run: |
          flutter create --platforms=android --project-name mood_ai_mobile --org ai.mood --no-overwrite .
          rm -f test/widget_test.dart  # stock template test references a MyApp that isn't ours
          # modern plugin lifecycle (flutter_plugin_android_lifecycle) needs compileSdk ≥ 36
          python3 - << 'PY'
          import pathlib, re
          for name in ("android/app/build.gradle.kts", "android/app/build.gradle"):
              p = pathlib.Path(name)
              if not p.exists():
                  continue
              s = p.read_text()
              s = re.sub(r"compileSdk\s*=\s*flutter\.compileSdkVersion", "compileSdk = 36", s)
              s = re.sub(r'compileSdk\s+flutter\.compileSdkVersion', 'compileSdk 36', s)
              s = re.sub(r"targetSdk\s*=\s*flutter\.targetSdkVersion", "targetSdk = 36", s)
              s = re.sub(r'targetSdk\s+flutter\.targetSdkVersion', 'targetSdk 36', s)
              p.write_text(s)
              print("patched", p)
          PY

      - name: Gradle init script — force compileSdk 36 on EVERY android module (plugins too)
        run: |
          # Groovy init script: works for both Groovy & KTS projects, no AGP-9 DSL typing traps.
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/compile-sdk-36.gradle << 'GROOVY'
          allprojects {
              afterEvaluate { project ->
                  def isAndroid = project.plugins.hasPlugin('com.android.library') ||
                                  project.plugins.hasPlugin('com.android.application')
                  if (isAndroid) {
                      project.android.compileSdkVersion = 36
                      project.logger.lifecycle("[init] ${project.name}: compileSdk -> 36")
                  }
              }
          }
          GROOVY

      - name: Grant runtime permissions (release manifest)
        working-directory: mobile
        run: |
          python3 - << 'PY'
          import pathlib
          p = pathlib.Path("android/app/src/main/AndroidManifest.xml")
          s = p.read_text()
          perms = ('<uses-permission android:name="android.permission.INTERNET"/>\n'
                   '    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n')
          if "RECORD_AUDIO" not in s:
              s = s.replace("<application", perms + "    <application", 1)
              p.write_text(s)
              print("manifest patched")
          PY

      - name: Prepare release signing (optional — from repo secrets)
        working-directory: mobile
        env:
          KS_B64: ${{ secrets.MOOD_UPLOAD_KEYSTORE }}
          KS_PASS: ${{ secrets.MOOD_UPLOAD_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.MOOD_UPLOAD_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.MOOD_UPLOAD_KEY_PASSWORD }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > android/app/mood-upload.jks
            printf 'storeFile=mood-upload.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' "$KS_PASS" "$KEY_ALIAS" "$KEY_PASS" > android/key.properties
            echo "release signing: ENABLED ($(stat -c%s android/app/mood-upload.jks)-byte keystore)"
          else
            echo "release signing: skipped (no MOOD_UPLOAD_KEYSTORE secret) — debug signature used"
          fi

      - name: Firebase config for push (optional — secret FCM_GOOGLE_SERVICES_JSON)
        working-directory: mobile
        env:
          GJSON: ${{ secrets.FCM_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GJSON" ]; then
            printf '%s' "$GJSON" > android/app/google-services.json
          fi
          python3 - << 'PY'
          import pathlib
          target = pathlib.Path("android/app/google-services.json")
          if not target.exists():
              print("no FCM secret — building without push config (app runs normally, notifications stay off)")
          else:
              app = pathlib.Path("android/app/build.gradle.kts")
              s = app.read_text()
              if "com.google.gms.google-services" not in s:
                  anchor = 'id("dev.flutter.flutter-gradle-plugin")'
                  assert anchor in s, "unexpected app plugins block"
                  s = s.replace(anchor, anchor + '\n    id("com.google.gms.google-services")', 1)
                  app.write_text(s)
                  print("gms plugin applied at app module")
              for root_name in ("android/build.gradle.kts", "android/build.gradle"):
                  root = pathlib.Path(root_name)
                  if not root.exists():
                      continue
                  r = root.read_text()
                  if "google-services" in r or "plugins {" not in r:
                      continue
                  r = r.replace(
                      "plugins {",
                      'plugins {\n    id("com.google.gms.google-services") version "4.4.2" apply false',
                      1,
                  )
                  root.write_text(r)
                  print("gms buildscript registered:", root)
              print("google-services.json + gms plugins: configured")
          PY

      - name: Enable R8 minification + resource shrinking + conditional release signing
        working-directory: mobile
        run: |
          python3 - << 'PY'
          import pathlib
          patched = False
          for name in ("android/app/build.gradle.kts", "android/app/build.gradle"):
              p = pathlib.Path(name)
              if not p.exists():
                  continue
              s = p.read_text()
              anchor_kts = 'signingConfig = signingConfigs.getByName("debug")'
              anchor_groovy = 'signingConfig signingConfigs.debug'
              if anchor_kts in s:
                  addition = "\n".join([
                      "            val keyPropsFile = rootProject.file(\"key.properties\")",
                      "            if (keyPropsFile.exists()) {",
                      "                val kp = Properties()",
                      "                kp.load(FileInputStream(keyPropsFile))",
                      "                signingConfig = signingConfigs.create(\"release\").apply {",
                      '                    storeFile = file(kp["storeFile"] as String)',
                      '                    storePassword = kp["storePassword"] as String',
                      '                    keyAlias = kp["keyAlias"] as String',
                      '                    keyPassword = kp["keyPassword"] as String',
                      "                }",
                      "            } else {",
                      "                signingConfig = signingConfigs.getByName(\"debug\")",
                      "            }",
                      "            isMinifyEnabled = true",
                      "            isShrinkResources = true",
                      '            proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")',
                  ])
                  s = s.replace(anchor_kts, addition, 1)
                  if "import java.util.Properties" not in s:
                      s = "import java.util.Properties\nimport java.io.FileInputStream\n\n" + s
                      print("prepended kts imports")
                  print("signing+R8 patch applied (kts):", p)
                  patched = True
              elif anchor_groovy in s:
                  addition = ("            minifyEnabled true\n"
                              "            shrinkResources true\n"
                              "            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'")
                  s = s.replace(anchor_groovy, anchor_groovy + "\n" + addition, 1)
                  print("R8 patch applied (groovy):", p)
                  patched = True
              p.write_text(s)
          if not patched:
              print("note: release-block anchor not found - skipping R8 patch (APKs stay unshrunk)")
          rules = pathlib.Path("android/app/proguard-rules.pro")
          rules.write_text("\n".join([
              "# Keep everything Flutter + plugins reach via channels/reflection.",
              "-keep class io.flutter.** { *; }",
              "-keep class io.flutter.plugins.** { *; }",
              "-keep class com.llfbandit.record.** { *; }",
              "-keepattributes *Annotation*,Signature,InnerClasses,EnclosingMethod,Exceptions",
              "-dontwarn io.flutter.**",
              "-dontwarn org.conscrypt.**",
              "",
          ]))
          print("wrote", rules)
          PY

      - name: Enable core library desugaring (flutter_local_notifications hard-requirement)
        working-directory: mobile
        run: |
          python3 - << 'PY'
          import pathlib
          for name in ("android/app/build.gradle.kts", "android/app/build.gradle"):
              p = pathlib.Path(name)
              if not p.exists():
                  continue
              s = p.read_text()
              if "coreLibraryDesugaring" in s:
                  print("desugaring already enabled:", p)
                  continue
              kts = name.endswith(".kts")
              enable_line = ("        isCoreLibraryDesugaringEnabled = true"
                             if kts else "        coreLibraryDesugaringEnabled true")
              if "compileOptions {" in s:
                  s = s.replace("compileOptions {", "compileOptions {\n" + enable_line, 1)
              s = s.rstrip() + ('\n\ndependencies {\n    coreLibraryDesugaring('
                                '"com.android.tools:desugar_jdk_libs:2.1.5")\n}\n')
              p.write_text(s)
              print("desugaring enabled:", p)
          PY

      - name: Pub get
        working-directory: mobile
        run: flutter pub get

      - name: Generate launcher icons (brand ✦ replaces the Flutter default)
        working-directory: mobile
        run: dart run flutter_launcher_icons

      - name: Static analysis (non-blocking)
        working-directory: mobile
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build release APKs — universal + split-per-ABI (obfuscated, R8-shrunk)
        working-directory: mobile
        env:
          MOBILE_API_URL: ${{ inputs.api_url || secrets.MOOD_MOBILE_API_URL }}
        run: |
          ARGS=""
          if [ -n "$MOBILE_API_URL" ]; then ARGS="--dart-define=API_URL=$MOBILE_API_URL"; fi
          # universal APK (all devices) + per-ABI APKs (much smaller downloads)
          flutter build apk --release --obfuscate --split-debug-info=build/app/symbols-universal $ARGS
          flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/app/symbols-abi $ARGS
          flutter build appbundle --release --obfuscate --split-debug-info=build/app/symbols-aab $ARGS
          echo "── APK sizes ──"
          du -h build/app/outputs/flutter-apk/*.apk
          echo "── AAB (Play Console) ──"
          du -h build/app/outputs/bundle/release/app-release.aab
          echo "── obfuscation symbols ──"
          du -sh build/app/symbols-universal build/app/symbols-abi build/app/symbols-aab

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mood-ai-android-apks
          path: |
            mobile/build/app/outputs/flutter-apk/*.apk
            mobile/build/app/outputs/bundle/release/*.aab
          retention-days: 30
          if-no-files-found: error

      - name: Upload obfuscation symbols (90d — keep for crash symbolication)
        uses: actions/upload-artifact@v4
        with:
          name: mood-ai-android-symbols
          path: |
            mobile/build/app/symbols-universal/
            mobile/build/app/symbols-abi/
            mobile/build/app/symbols-aab/
          retention-days: 90

      - name: Attach APKs to the GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## 📲 Which APK should I install?
            | File | Device |
            |---|---|
            | **app-arm64-v8a-release.apk** ⭐ | Almost every modern Android phone |
            | app-x86_64-release.apk | Emulators, Chromebooks, some tablets |
            | app-armeabi-v7a-release.apk | Very old phones (pre-2015) |
            | app-release.apk | Universal — works everywhere, bigger file |
            On the phone: enable “Install unknown apps” for your browser → tap the downloaded APK → done.
            🏪 **Play Console:** upload `app-release.aab` (signed with your upload key once the
            `MOOD_UPLOAD_*` secrets are set — see workflow footer comments).
          files: |
            mobile/build/app/outputs/flutter-apk/*.apk
            mobile/build/app/outputs/bundle/release/app-release.aab

# Release-signing for Play distribution (wired above — optional):
#   1) keytool -genkey -v -keystore mood-upload.jks -keyalg RSA -keysize 2048 -validity 10000 -alias mood
#   2) repo → Settings → Secrets and variables → Actions:
#        MOOD_UPLOAD_KEYSTORE        = base64 -w0 mood-upload.jks
#        MOOD_UPLOAD_STORE_PASSWORD  = <keystore password>
#        MOOD_UPLOAD_KEY_ALIAS       = mood
#        MOOD_UPLOAD_KEY_PASSWORD    = <key password>
#   With those set, every build auto-signs APK + AAB with your upload key;
#   without them the debug key is used (fine for sideloaded dev APKs).
